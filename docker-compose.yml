version: "3.9"

services:
  invoice-crawler:
    build: .
    image: gdt-invoice-crawler:latest
    container_name: gdt-invoice-crawler
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - PLAYWRIGHT_HEADLESS=true
    volumes:
      # Persist database
      - ./invoices.db:/app/invoices.db
      # Persist downloaded files
      - ./downloads:/app/downloads
      - ./invoices:/app/invoices
      - ./exports:/app/exports
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s